<div class="widget-box" style="width: 100%; max-width: 600px; margin: 0 auto; border: 1px solid #25d366;">
    <div class="widget-title" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #25d36633; padding-bottom: 15px;">
        <span style="font-size: 1rem; color: #25d366;">🟢 NOTIFICAÇÃO WHATSAPP</span>
        <button onclick="limparCentro()" style="background: #25d366; color: white; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem;">
            FECHAR
        </button>
    </div>

    <div style="margin-top: 15px; background: #162033; padding: 15px; border-radius: 8px;">
        <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px;">
            Um novo resultado foi postado! Deseja notificar os usuários agora?
        </p>
        <textarea id="whatsapp-msg" style="width: 100%; height: 80px; background: #0f172a; color: white; border: 1px solid #25d36633; padding: 10px; border-radius: 6px; font-size: 0.85rem;">
Olá! O placar de um novo jogo acaba de ser atualizado no Bolão do Angeli 2026. Confira sua pontuação no ranking!
        </textarea>
        
        <button onclick="dispararMensagens()" id="btn-envio-wa" style="width: 100%; margin-top: 15px; background: #25d366; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
            ENVIAR PARA TODOS OS USUÁRIOS
        </button>
        <div id="wa-status" style="margin-top: 10px; font-size: 0.8rem; text-align: center;"></div>
    </div>
</div>

<script>
    async function dispararMensagens() {
        const btn = document.getElementById('btn-envio-wa');
        const status = document.getElementById('wa-status');
        const msg = document.getElementById('whatsapp-msg').value;

        // Confirmação para evitar disparos acidentais
        if (!confirm("Deseja enviar esta mensagem para todos os participantes?")) return;

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";
        status.style.color = "#94a3b8";
        status.innerText = "Conectando ao servidor e processando fila...";

        try {
            // Ajustado para a rota padrão de envio que costumamos usar no server.js
            const response = await fetch('/enviar-notificacao', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: msg })
            });
            
            const data = await response.json();
            
            if(response.ok && data.success) {
                status.innerHTML = "<span style='color: #10b981;'>Mensagens enviadas com sucesso!</span>";
                btn.innerText = "ENVIADO ✅";
            } else {
                // Caso o erro venha do servidor (ex: WhatsApp desconectado)
                throw new Error(data.error || "Erro desconhecido");
            }
        } catch (e) {
            console.error("Erro no disparo:", e);
            status.innerHTML = `<span style='color: #ef4444;'>Erro: ${e.message || "Servidor offline ou WhatsApp desconectado."}</span>`;
            btn.disabled = false;
            btn.innerText = "TENTAR NOVAMENTE";
        }
    }
</script>
