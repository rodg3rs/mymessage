<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto Oi</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #0f172a; color: white; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; text-align: center; }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Enviar Mensagem</h2>
        <button onclick="mandarOi()">Mandar "Oi" para o Desenvolvedor</button>
        <p id="status"></p>
    </div>

    <script>
        async function mandarOi() {
            const status = document.getElementById('status');
            status.innerText = "Enviando...";
            
            try {
                const res = await fetch('/enviar-oi', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        numero: "5519981266942", 
                        texto: "Oi" 
                    })
                });
                const data = await res.json();
                status.innerText = data.success ? "✅ Enviado!" : "❌ Erro: " + data.error;
            } catch (e) {
                status.innerText = "❌ Erro na conexão.";
            }
        }
    </script>
</body>
</html>
