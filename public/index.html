<div class="widget-box" style="border: 1px solid #25d366; padding: 20px; color: white; background: #162033;">
    <h3>🟢 TESTE DE NOTIFICAÇÃO</h3>
    <button id="btn-envio-wa" onclick="enviarTeste()" style="background: #25d366; padding: 10px; cursor: pointer;">
        MANDAR "OI" PARA ROGÉRIO
    </button>
    <div id="wa-status" style="margin-top: 10px;"></div>
</div>

<script>
    async function enviarTeste() {
        const btn = document.getElementById('btn-envio-wa');
        const status = document.getElementById('wa-status');
        
        btn.disabled = true;
        status.innerText = "Enviando...";

        try {
            const response = await fetch('/api/enviar-oi', { method: 'POST' });
            const data = await response.json();
            if (data.success) {
                status.innerHTML = "✅ Mensagem enviada!";
            } else {
                throw new Error(data.error);
            }
        } catch (e) {
            status.innerHTML = "❌ Erro: " + e.message;
            btn.disabled = false;
        }
    }
</script>
